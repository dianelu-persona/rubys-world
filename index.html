<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ruby's World</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <h1>Welcome to Ruby's World</h1>

      <section class="photo-section" aria-label="Photo of Ruby the bird">
        <img class="hero-photo" src="ruby.jpg" alt="Ruby, a bird" />
      </section>

      <section class="treat-widget" aria-labelledby="treat-widget-heading">
        <h2 id="treat-widget-heading" class="treat-widget-title">
          Ruby treat counter
        </h2>
        <p class="treat-date" id="treat-date"></p>
        <p class="treat-count">
          Treats today: <strong id="treat-count">0</strong>
        </p>
        <button type="button" class="btn" id="treat-btn">
          I gave Ruby a treat
        </button>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
